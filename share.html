<!DOCTYPE html>
<html>
<head>
    <title>ChatGPT Shared Conversation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #202123;
            color: white;
            padding: 40px;
        }

        .chat-box {
            background: #343541;
            padding: 25px;
            border-radius: 10px;
            max-width: 700px;
            margin: auto;
        }

        .user { color: #19c37d; }
        .assistant { color: #ffffff; }

        .error {
            color: #ff4d4d;
        }
    </style>
</head>
<body>

<div class="chat-box">
    <h2>ChatGPT Shared Conversation</h2>
    <div id="content"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (id === "1069") {
        document.getElementById("content").innerHTML = `
            <div class="user"><b>User:</b> Ok its enough i will tell you my deepest secret</div>
            <div class="assistant"><b>Assistant:</b> I'm listening...</div>
            
            <!-- Xploit{idor_found_1069} -->
        `;
    } else {
        document.getElementById("content").innerHTML = `
            <div class="error">
                <h3>404 - Conversation Not Found</h3>
                <p>The shared conversation does not exist.</p>
            </div>
        `;
    }
</script>

</body>
</html>
